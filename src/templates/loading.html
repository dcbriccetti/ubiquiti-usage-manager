{% extends "base.html" %}

{% block title %}{{ loading_title }} | UniFi Usage{% endblock %}

{% block content %}
    <section class="loading-stage">
        <article class="panel loading-panel" aria-live="polite">
            <div class="loading-spinner" aria-hidden="true"></div>
            <h1>{{ loading_title }}</h1>
            <p>{{ loading_message }}</p>
            <noscript>
                <p><a href="{{ target_url }}">Continue</a></p>
            </noscript>
        </article>
    </section>
    <script>
        requestAnimationFrame(() => {
            window.location.replace({{ target_url|tojson }});
        });
    </script>
{% endblock %}
