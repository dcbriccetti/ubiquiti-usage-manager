<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}UniFi Usage Dashboard{% endblock %}</title>
    <!--suppress CssUnusedSymbol -->
    <style>
        :root {
            --bg: #f4efe6;
            --panel: rgba(255, 251, 245, 0.88);
            --ink: #1f2933;
            --muted: #52606d;
            --accent: #0f766e;
            --accent-soft: #d6f5ef;
            --warn: #c2410c;
            --line: rgba(31, 41, 51, 0.12);
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --space-7: 32px;
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 20px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Avenir Next", "Segoe UI", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(15, 118, 110, 0.18), transparent 35%),
                radial-gradient(circle at top right, rgba(194, 65, 12, 0.12), transparent 30%),
                linear-gradient(180deg, #faf6ef 0%, #f4efe6 100%);
        }

        a {
            color: inherit;
        }

        a.mac-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 400;
        }

        a.mac-link:hover,
        a.mac-link:focus-visible {
            background: rgba(15, 118, 110, 0.10);
            outline: none;
        }

        .page {
            max-width: 1120px;
            margin: 0 auto;
            padding: var(--space-7) var(--space-5) 48px;
        }

        .page.wide-page {
            max-width: min(1840px, calc(100vw - 48px));
        }

        .hero {
            display: flex;
            justify-content: space-between;
            gap: var(--space-5);
            align-items: end;
            margin-bottom: var(--space-6);
        }

        .detail-hero {
            justify-content: flex-start;
            align-items: flex-start;
            gap: var(--space-6);
            margin-bottom: var(--space-4);
        }

        .dashboard-hero {
            display: grid;
            grid-template-columns: minmax(0, 3fr) minmax(280px, 1fr);
            align-items: start;
        }

        .dashboard-hero-main {
            align-self: stretch;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: var(--space-5);
        }

        .detail-hero .stat {
            min-width: 220px;
        }

        .detail-links {
            display: flex;
            gap: var(--space-3);
            align-items: center;
            margin-bottom: var(--space-2);
        }

        .detail-links a {
            color: var(--accent);
            text-decoration: underline;
        }

        .report-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-3);
            align-items: center;
            margin-top: var(--space-4);
        }

        .report-quick-links {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-2);
            align-items: center;
        }

        .report-toolbar a,
        .report-month-form button {
            min-height: 34px;
            padding: 7px 11px;
            border: 1px solid rgba(15, 118, 110, 0.32);
            border-radius: 8px;
            background: rgba(15, 118, 110, 0.08);
            color: var(--accent);
            font: inherit;
            font-size: 0.9rem;
            line-height: 1;
            text-decoration: none;
            cursor: pointer;
        }

        .report-toolbar a:hover,
        .report-toolbar a:focus-visible,
        .report-month-form button:hover,
        .report-month-form button:focus-visible {
            background: rgba(15, 118, 110, 0.14);
            outline: none;
        }

        .report-month-form {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-2);
            align-items: center;
        }

        .report-month-form label {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--muted);
        }

        .report-month-form select {
            min-height: 34px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.62);
            color: var(--ink);
            font: inherit;
            font-size: 0.92rem;
            padding: 6px 30px 6px 10px;
        }

        .report-export-link {
            font-weight: 700;
        }

        .report-user-stat {
            border-color: rgba(15, 118, 110, 0.32);
            background:
                linear-gradient(160deg, rgba(15, 118, 110, 0.18), rgba(15, 118, 110, 0.07)),
                var(--panel);
        }

        .report-user-stat .label {
            color: rgba(15, 118, 110, 0.88);
        }

        .report-user-stat .value {
            font-size: 2.15rem;
            letter-spacing: 0;
        }

        .warn-text {
            color: var(--warn);
            font-weight: 700;
        }

        .hero h1 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 3.4rem);
            line-height: 0.95;
            letter-spacing: 0;
        }

        .hero p {
            margin: var(--space-3) 0 0;
            color: var(--muted);
            max-width: 1000px;
        }

        .grid {
            display: grid;
            gap: var(--space-5);
        }

        .stats {
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            align-items: stretch;
            margin-bottom: var(--space-6);
        }

        .dashboard-stats {
            grid-template-columns: repeat(4, minmax(0, 1fr));
            margin-bottom: 0;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 45px rgba(31, 41, 51, 0.08);
        }

        .panel.panel-loading {
            opacity: 0.72;
        }

        .stat {
            padding: var(--space-5);
        }

        .dashboard-stats .stat {
            min-height: 112px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .dashboard-stats .detail-note {
            min-height: 1.15em;
        }

        .stat .label {
            display: block;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0;
            color: var(--muted);
        }

        .stat .value {
            display: block;
            margin-top: var(--space-3);
            font-size: 2rem;
            font-weight: 700;
        }

        .stat .value.stat-combo {
            font-size: 1.35rem;
            line-height: 1.3;
        }

        .detail-facts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: var(--space-4);
            margin-top: var(--space-5);
        }

        .detail-facts > div {
            min-width: 0;
            padding-top: var(--space-4);
            border-top: 1px solid var(--line);
        }

        .detail-facts .label {
            display: block;
            color: var(--muted);
            font-size: 0.78rem;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .detail-facts strong {
            display: block;
            margin-top: var(--space-2);
            font-size: 1.45rem;
            line-height: 1.15;
        }

        .detail-note {
            display: block;
            margin-top: var(--space-1);
            color: var(--muted);
            font-size: 0.95rem;
            font-weight: 700;
        }

        .top-consumers-panel {
            min-height: 190px;
            align-self: stretch;
        }

        .top-consumers-chart-wrap {
            position: relative;
            display: grid;
            grid-template-columns: minmax(138px, 150px) minmax(0, 1fr);
            gap: var(--space-4);
            align-items: center;
            min-height: 150px;
            margin-top: var(--space-2);
        }

        .top-consumers-chart-frame {
            width: min(150px, 100%);
            aspect-ratio: 1;
            justify-self: center;
            min-width: 0;
        }

        .top-consumers-chart-frame canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        .top-consumers-legend {
            display: grid;
            gap: 7px 10px;
            align-content: center;
            min-width: 0;
        }

        .top-consumers-legend-item {
            display: grid;
            grid-template-columns: 12px minmax(0, 1fr);
            gap: 9px;
            align-items: center;
            min-width: 0;
            color: var(--muted);
            font-size: 0.94rem;
            line-height: 1.15;
        }

        .top-consumers-legend-swatch {
            width: 12px;
            height: 12px;
            border: 1px solid rgba(255, 251, 245, 0.95);
        }

        .top-consumers-legend-label {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .top-consumers-empty {
            margin: var(--space-4) 0 0;
            font-size: 0.92rem;
        }

        .columns {
            grid-template-columns: 0.95fr 1.25fr;
            align-items: start;
        }

        .panel h2 {
            margin: 0 0 var(--space-4);
            font-size: 1.1rem;
        }

        .panel-title-row {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-3);
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-4);
        }

        .panel-title-row h2 {
            margin-bottom: 0;
        }

        .panel-range-control {
            display: flex;
            gap: var(--space-2);
            align-items: center;
            color: var(--muted);
            font-size: 0.88rem;
        }

        .panel-range-control select {
            min-height: 32px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.70);
            color: var(--ink);
            font: inherit;
            font-size: 0.9rem;
            padding: 5px 30px 5px 10px;
        }

        .panel-body {
            padding: var(--space-5);
        }

        .panel h3 {
            margin: var(--space-4) 0 var(--space-3);
            font-size: 0.98rem;
            color: var(--muted);
        }

        .table-wrap {
            overflow-x: auto;
        }

        .flow-activity-table th.num,
        .flow-activity-table td.num {
            white-space: nowrap;
        }

        .table-controls {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-2);
            align-items: center;
            justify-content: flex-end;
            margin: calc(-1 * var(--space-2)) 0 var(--space-3);
        }

        .table-controls[hidden] {
            display: none;
        }

        .table-controls label {
            display: flex;
            gap: var(--space-1);
            align-items: center;
            color: var(--muted);
            font-size: 0.88rem;
        }

        .table-controls select,
        .table-controls button {
            min-height: 30px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.70);
            color: var(--ink);
            font: inherit;
            font-size: 0.86rem;
            padding: 4px 8px;
        }

        .table-controls button {
            cursor: pointer;
        }

        .table-controls button:disabled {
            cursor: default;
            opacity: 0.45;
        }

        .range-dash {
            display: inline-block;
            padding: 0 0.18em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        table.compact-table {
            width: 100%;
            min-width: 1280px;
            border-spacing: 0;
            font-size: 0.98rem;
        }

        table.fit-content-table {
            width: max-content;
            min-width: 0;
        }

        th,
        td {
            text-align: left;
            padding: 8px var(--space-2);
            border-bottom: 1px solid var(--line);
            vertical-align: middle;
            line-height: 1.2;
        }

        th {
            font-size: 0.78rem;
            letter-spacing: 0;
            color: var(--muted);
            font-weight: 700;
        }

        table.compact-table thead th {
            white-space: nowrap;
        }

        table.compact-table tbody tr:nth-child(even) td:not(.usage-col):not(.speed-col) {
            background-color: rgba(255, 255, 255, 0.28);
        }

        table.compact-table tbody tr:hover td {
            background-color: rgba(15, 118, 110, 0.10);
        }

        th.usage-group {
            text-align: center;
            background: rgba(15, 118, 110, 0.13);
            border-left: 1px solid rgba(15, 118, 110, 0.22);
        }

        th.speed-group {
            text-align: center;
            background: rgba(194, 65, 12, 0.13);
            border-left: 1px solid rgba(194, 65, 12, 0.22);
        }

        th.cost-group {
            text-align: center;
            background: rgba(15, 118, 110, 0.13);
            border-left: 1px solid rgba(15, 118, 110, 0.24);
        }

        th.wan-group {
            text-align: center;
            background: rgba(37, 99, 235, 0.12);
            border-left: 1px solid rgba(37, 99, 235, 0.22);
        }

        th.num,
        td.num {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        th.usage-col,
        td.usage-col {
            background: rgba(15, 118, 110, 0.055);
        }

        th.speed-col,
        td.speed-col {
            background: rgba(194, 65, 12, 0.055);
        }

        th.wan-col,
        td.wan-col {
            background: rgba(37, 99, 235, 0.055);
            border-left: 1px solid rgba(37, 99, 235, 0.22);
        }

        th.usage-first,
        td.usage-first {
            border-left: 1px solid rgba(15, 118, 110, 0.24);
        }

        th.usage-last,
        td.usage-last {
            border-left: 1px solid rgba(15, 118, 110, 0.24);
            border-right: 1px solid rgba(15, 118, 110, 0.18);
        }

        th.speed-first,
        td.speed-first {
            border-left: 1px solid rgba(194, 65, 12, 0.24);
        }

        table.non-realtime-window th.recent-col,
        table.non-realtime-window td.recent-col,
        table.non-realtime-window th.last-5-col,
        table.non-realtime-window td.last-5-col,
        table.non-realtime-window th.rate-col,
        table.non-realtime-window td.rate-col,
        table.non-realtime-window th.ip-col,
        table.non-realtime-window td.ip-col,
        table.non-realtime-window th.band-col,
        table.non-realtime-window td.band-col,
        table.non-realtime-window th.channel-col,
        table.non-realtime-window td.channel-col,
        table.non-realtime-window th.sig-col,
        table.non-realtime-window td.sig-col {
            display: none;
        }

        table.hide-cost-column th.usage-last,
        table.hide-cost-column th.cost-group,
        table.hide-cost-column td.usage-last {
            display: none;
        }

        table.non-realtime-window th.today-col,
        table.non-realtime-window td.today-col {
            border-left: 1px solid rgba(15, 118, 110, 0.24);
        }

        table.focus-today td.today-col,
        table.focus-7-days td.seven-days-col,
        table.focus-month td.month-col,
        table.focus-today td.usage-last,
        table.focus-7-days td.usage-last,
        table.focus-month td.usage-last {
            font-weight: 700;
            color: #172026;
        }

        .dashboard-loading-status {
            font-size: 0.86rem;
        }

        .loading-stage {
            min-height: min(520px, calc(100vh - 160px));
            display: grid;
            place-items: center;
            text-align: center;
        }

        .loading-panel {
            width: min(420px, 100%);
            padding: var(--space-7);
        }

        .loading-spinner {
            width: 52px;
            height: 52px;
            margin: 0 auto var(--space-5);
            border: 4px solid rgba(15, 118, 110, 0.14);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: loading-spin 0.8s linear infinite;
        }

        .loading-panel h1 {
            margin: 0;
            font-size: 1.8rem;
            line-height: 1.1;
        }

        .loading-panel p {
            margin: var(--space-3) 0 0;
            color: var(--muted);
        }

        @keyframes loading-spin {
            to {
                transform: rotate(360deg);
            }
        }

        table.dashboard-loading {
            opacity: 0.66;
        }

        table.compact-table .client-name-col {
            min-width: 190px;
        }

        table.compact-table .mac-cell {
            min-width: 58px;
        }

        table.compact-table .ip-col {
            min-width: 54px;
        }

        table.compact-table .band-col {
            min-width: 46px;
        }

        table.compact-table .channel-col {
            min-width: 40px;
        }

        table.compact-table .recent-col,
        table.compact-table .today-col,
        table.compact-table .seven-days-col,
        table.compact-table .month-col {
            min-width: 68px;
        }

        table.compact-table .usage-last {
            min-width: 74px;
        }

        th.ap-col,
        td.ap-col {
            white-space: nowrap;
        }

        th.nowrap-col,
        td.nowrap-col {
            white-space: nowrap;
        }

        th.activity-col,
        td.activity-col {
            min-width: 154px;
        }

        .activity-heading {
            display: inline-flex;
            align-items: center;
            gap: var(--space-1);
        }

        .activity-heading select {
            min-height: 26px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.70);
            color: var(--ink);
            font: inherit;
            font-size: 0.78rem;
            padding: 2px 6px;
        }

        .sparkline {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 20px;
            padding: 2px 3px;
            border: 1px solid rgba(31, 41, 51, 0.18);
            border-radius: 4px;
            background: rgba(15, 118, 110, 0.10);
        }

        .sparkline .bar {
            flex: 1 1 0;
            min-width: 4px;
            position: relative;
            border-radius: 2px 2px 0 0;
            background: rgba(15, 118, 110, 0.75);
        }

        .sparkline .bar.capped::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            border-top: 1px solid rgba(31, 41, 51, 0.72);
        }

        .sparkline .bar.zero {
            background: rgba(31, 41, 51, 0.16);
        }

        .month-chart-wrap {
            margin: 0 0 var(--space-3);
            padding: var(--space-3) 14px;
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.55);
            overflow-x: auto;
            height: 330px;
        }

        .month-chart-canvas {
            width: 100% !important;
            height: 100% !important;
            min-width: 860px;
            display: block;
        }

        .usage-scale-row {
            display: grid;
            grid-template-columns: minmax(0, 2.6fr) minmax(230px, 1fr);
            gap: var(--space-4);
            align-items: stretch;
            margin-bottom: var(--space-3);
        }

        .usage-scale-row .month-chart-wrap {
            margin-bottom: 0;
        }

        .usage-scale-primary .month-chart-canvas {
            min-width: 620px;
        }

        .usage-scale-pie-wrap {
            display: grid;
            grid-template-rows: auto 1fr;
            gap: var(--space-2);
            align-content: start;
            overflow: hidden;
        }

        .usage-scale-pie-wrap h3 {
            margin: 0;
            font-size: 1rem;
        }

        .usage-scale-pie-canvas {
            width: 100% !important;
            height: 100% !important;
            min-width: 0;
            min-height: 0;
            display: block;
        }

        .usage-scale-empty {
            margin: 0;
            font-size: 0.92rem;
        }

        tbody tr:last-child td {
            border-bottom: 0;
        }

        .pill {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 0.78rem;
            font-weight: 700;
        }

        .pill.warn {
            background: rgba(194, 65, 12, 0.1);
            color: var(--warn);
        }

        .muted {
            color: var(--muted);
        }

        .mono {
            font-family: "SFMono-Regular", "Menlo", monospace;
        }

        .mac-cell {
            font-size: 0.9em;
            letter-spacing: 0;
        }

        .stack {
            display: grid;
            gap: var(--space-4);
        }

        .list {
            display: grid;
            gap: var(--space-3);
        }

        .list-item {
            padding: 14px var(--space-4);
            border-radius: var(--radius-md);
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.55);
        }

        .list-item strong {
            display: block;
            margin-bottom: 4px;
        }

        .voucher-form {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-3);
            align-items: end;
        }

        .voucher-form label {
            display: grid;
            gap: 6px;
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--muted);
        }

        .voucher-form input {
            min-height: 38px;
            min-width: 132px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.72);
            color: var(--ink);
            font: inherit;
            padding: 7px 10px;
        }

        .voucher-form select {
            min-height: 38px;
            min-width: 154px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.72);
            color: var(--ink);
            font: inherit;
            padding: 7px 10px;
        }

        .voucher-form button {
            min-height: 38px;
            border: 1px solid rgba(15, 118, 110, 0.32);
            border-radius: 8px;
            background: rgba(15, 118, 110, 0.12);
            color: var(--accent);
            cursor: pointer;
            font: inherit;
            font-weight: 700;
            padding: 8px 13px;
        }

        .voucher-form button:hover,
        .voucher-form button:focus-visible {
            background: rgba(15, 118, 110, 0.18);
            outline: none;
        }

        .voucher-trend-layout {
            display: grid;
            grid-template-columns: minmax(0, 2fr) minmax(240px, 0.8fr);
            gap: var(--space-4);
            align-items: start;
            margin-top: var(--space-2);
        }

        .voucher-trend-chart-wrap {
            height: 260px;
            margin: 0;
        }

        .voucher-trend-chart-wrap .month-chart-canvas {
            min-width: 620px;
        }

        .voucher-trend-side h3 {
            margin-top: 0;
        }

        .voucher-recent-days-table {
            width: 100%;
            min-width: 0;
        }

        .voucher-rate-unit {
            margin-left: 2px;
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .voucher-eta-value,
        .voucher-recommendation {
            font-size: 1.05rem;
            line-height: 1.2;
            overflow-wrap: anywhere;
        }

        .admin-login-form {
            display: grid;
            gap: var(--space-3);
            max-width: 360px;
        }

        .admin-login-form label {
            display: grid;
            gap: 6px;
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--muted);
        }

        .admin-login-form input {
            min-height: 40px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.72);
            color: var(--ink);
            font: inherit;
            padding: 8px 10px;
        }

        .admin-login-form button {
            min-height: 40px;
            border: 1px solid rgba(15, 118, 110, 0.32);
            border-radius: 8px;
            background: rgba(15, 118, 110, 0.12);
            color: var(--accent);
            cursor: pointer;
            font: inherit;
            font-weight: 700;
            padding: 8px 13px;
        }

        .admin-login-form button:hover,
        .admin-login-form button:focus-visible {
            background: rgba(15, 118, 110, 0.18);
            outline: none;
        }

        .voucher-action-form {
            margin: 0;
        }

        .voucher-action-form button {
            min-height: 30px;
            border: 1px solid rgba(194, 65, 12, 0.36);
            border-radius: 8px;
            background: rgba(194, 65, 12, 0.10);
            color: var(--warn);
            cursor: pointer;
            font: inherit;
            font-size: 0.86rem;
            font-weight: 700;
            padding: 5px 9px;
            white-space: nowrap;
        }

        .voucher-action-form button:hover,
        .voucher-action-form button:focus-visible {
            background: rgba(194, 65, 12, 0.16);
            outline: none;
        }

        .usage-history-panel .panel-body {
            max-height: 500px;
            overflow: auto;
        }

        .usage-history-panel table {
            width: max-content;
            min-width: 0;
        }

        .usage-history-panel th,
        .usage-history-panel td {
            padding: 6px 8px;
            line-height: 1.15;
            white-space: nowrap;
        }

        .usage-history-panel th:nth-child(1),
        .usage-history-panel td:nth-child(1) {
            padding-right: 4px;
            white-space: nowrap;
            width: 1%;
        }

        .usage-history-panel th:nth-child(2),
        .usage-history-panel td:nth-child(2) {
            padding-left: 4px;
            white-space: nowrap;
            width: 1%;
        }

        .insights-kpis {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: var(--space-3);
            margin-bottom: var(--space-3);
        }

        .insight-kpi {
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.55);
            padding: var(--space-3);
        }

        .insight-kpi .label {
            display: block;
            color: var(--muted);
            font-size: 0.74rem;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .insight-kpi .value {
            display: block;
            margin-top: 6px;
            font-size: 1.35rem;
            font-weight: 700;
        }

        .control-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: var(--space-3);
            margin-bottom: var(--space-3);
        }

        .control-row label {
            margin: 0;
        }

        .insights-detail-stack {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: var(--space-6);
        }

        .insights-detail-stack article {
            width: 100%;
            max-width: none;
        }

        .insights-summary .muted {
            max-width: 1000px;
        }

        table.insights-table {
            width: auto;
            min-width: 0;
            table-layout: fixed;
        }

        table.insights-table th:first-child,
        table.insights-table td:first-child {
            width: 170px;
            max-width: 170px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        table.insights-table th.num,
        table.insights-table td.num {
            width: 90px;
            white-space: nowrap;
        }

        table.organization-clients-table {
            width: max-content;
            min-width: 0;
            table-layout: auto;
        }

        table.organization-clients-table th:first-child,
        table.organization-clients-table td:first-child {
            width: 1%;
            max-width: none;
            white-space: nowrap;
            overflow: visible;
            text-overflow: clip;
        }

        table.organization-clients-table th.user-id-col,
        table.organization-clients-table td.user-id-col,
        table.organization-clients-table th.mac-col,
        table.organization-clients-table td.mac-col,
        table.organization-clients-table th.network-col,
        table.organization-clients-table td.network-col {
            width: 1%;
            max-width: none;
            white-space: nowrap;
            overflow: visible;
            text-overflow: clip;
        }

        table.organization-clients-table th.network-col,
        table.organization-clients-table td.network-col {
            width: 5ch;
            padding-left: var(--space-2);
            padding-right: var(--space-2);
        }

        .concurrency-heatmap-wrap {
            margin: 0 0 var(--space-3);
            padding: var(--space-3);
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.50);
            overflow-x: auto;
        }

        .concurrency-heatmap-grid {
            display: grid;
            grid-template-columns: 56px repeat(24, minmax(26px, 1fr));
            gap: 3px;
            align-items: center;
            min-width: 860px;
        }

        .concurrency-heatmap-grid .cell {
            min-height: 24px;
            border-radius: 4px;
            font-size: 0.68rem;
            line-height: 1.1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #243447;
        }

        .concurrency-heatmap-grid .cell.header {
            background: transparent;
            font-weight: 700;
            color: var(--muted);
        }

        .concurrency-heatmap-grid .cell.header.day {
            justify-content: flex-start;
            padding-left: 4px;
        }

        .concurrency-heatmap-grid .cell.value {
            border: 1px solid rgba(51, 65, 85, 0.14);
            font-variant-numeric: tabular-nums;
        }

        .concurrency-heatmap-grid .cell.value.low-sample {
            opacity: 0.45;
            border-style: dashed;
            font-size: 0.62rem;
            font-weight: 600;
        }

        @media (max-width: 900px) {
            .columns {
                grid-template-columns: 1fr;
            }

            .voucher-trend-layout {
                grid-template-columns: 1fr;
            }

            .hero {
                display: block;
            }

            .dashboard-hero {
                display: grid;
                grid-template-columns: 1fr;
            }

            .dashboard-stats {
                grid-template-columns: 1fr;
            }

            .top-consumers-chart-wrap {
                grid-template-columns: minmax(138px, 160px) minmax(0, 1fr);
            }

            .usage-scale-row {
                grid-template-columns: 1fr;
            }

            .usage-scale-primary .month-chart-canvas {
                min-width: 0;
            }
        }

        @media (max-width: 560px) {
            .top-consumers-chart-wrap {
                grid-template-columns: 1fr;
                grid-template-rows: minmax(130px, 1fr) auto;
                height: auto;
                min-height: 230px;
                align-items: stretch;
            }

            .top-consumers-legend {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
    </style>
</head>
<body>
    <main class="page{% block page_class %}{% endblock %}">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
