<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}UniFi Usage Dashboard{% endblock %}</title>
    <style>
        :root {
            --bg: #f4efe6;
            --panel: rgba(255, 251, 245, 0.88);
            --ink: #1f2933;
            --muted: #52606d;
            --accent: #0f766e;
            --accent-soft: #d6f5ef;
            --warn: #c2410c;
            --line: rgba(31, 41, 51, 0.12);
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --space-7: 32px;
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 20px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Avenir Next", "Segoe UI", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(15, 118, 110, 0.18), transparent 35%),
                radial-gradient(circle at top right, rgba(194, 65, 12, 0.12), transparent 30%),
                linear-gradient(180deg, #faf6ef 0%, #f4efe6 100%);
        }

        a {
            color: inherit;
        }

        a.mac-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 400;
        }

        a.mac-link:hover,
        a.mac-link:focus-visible {
            background: rgba(15, 118, 110, 0.10);
            outline: none;
        }

        .page {
            max-width: 1120px;
            margin: 0 auto;
            padding: var(--space-7) var(--space-5) 48px;
        }

        .page.wide-page {
            max-width: 1440px;
        }

        .hero {
            display: flex;
            justify-content: space-between;
            gap: var(--space-5);
            align-items: end;
            margin-bottom: var(--space-6);
        }

        .detail-hero {
            justify-content: flex-start;
            align-items: flex-start;
            gap: var(--space-6);
            margin-bottom: var(--space-4);
        }

        .detail-hero .stat {
            min-width: 220px;
        }

        .hero h1 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 3.4rem);
            line-height: 0.95;
            letter-spacing: -0.04em;
        }

        .hero p {
            margin: var(--space-3) 0 0;
            color: var(--muted);
            max-width: 1000px;
        }

        .grid {
            display: grid;
            gap: var(--space-5);
        }

        .stats {
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            margin-bottom: var(--space-6);
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 45px rgba(31, 41, 51, 0.08);
        }

        .stat {
            padding: var(--space-5);
        }

        .stat .label {
            display: block;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
        }

        .stat .value {
            display: block;
            margin-top: var(--space-3);
            font-size: 2rem;
            font-weight: 700;
        }

        .columns {
            grid-template-columns: 0.95fr 1.25fr;
            align-items: start;
        }

        .panel h2 {
            margin: 0 0 var(--space-4);
            font-size: 1.1rem;
        }

        .panel-body {
            padding: var(--space-5);
        }

        .panel h3 {
            margin: var(--space-4) 0 var(--space-3);
            font-size: 0.98rem;
            color: var(--muted);
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        table.compact-table {
            width: max-content;
            min-width: 1180px;
        }

        th,
        td {
            text-align: left;
            padding: 6px var(--space-1);
            border-bottom: 1px solid var(--line);
            vertical-align: top;
            line-height: 1.2;
        }

        th {
            font-size: 0.76rem;
            letter-spacing: 0.02em;
            color: var(--muted);
        }

        th.usage-group {
            text-align: center;
            background: rgba(15, 118, 110, 0.10);
        }

        th.speed-group {
            text-align: center;
            background: rgba(194, 65, 12, 0.10);
        }

        th.num,
        td.num {
            text-align: right;
        }

        th.usage-col,
        td.usage-col {
            background: rgba(15, 118, 110, 0.06);
        }

        th.speed-col,
        td.speed-col {
            background: rgba(194, 65, 12, 0.06);
        }

        table.non-realtime-window th.minute-group,
        table.non-realtime-window th.minute-col,
        table.non-realtime-window td.minute-col,
        table.non-realtime-window th.mbps-col,
        table.non-realtime-window td.mbps-col {
            display: none;
        }

        table.focus-minute-total td.minute-total-col,
        table.focus-today td.today-col,
        table.focus-7-days td.seven-days-col,
        table.focus-month td.month-col {
            font-weight: 600;
        }

        th.ap-col,
        td.ap-col {
            white-space: nowrap;
        }

        th.nowrap-col,
        td.nowrap-col {
            white-space: nowrap;
        }

        th.activity-col,
        td.activity-col {
            min-width: 92px;
        }

        .sparkline {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 20px;
            padding: 2px 3px;
            border: 1px solid rgba(31, 41, 51, 0.18);
            border-radius: 4px;
            background: rgba(15, 118, 110, 0.10);
        }

        .sparkline .bar {
            flex: 1 1 0;
            min-width: 4px;
            border-radius: 2px 2px 0 0;
            background: rgba(15, 118, 110, 0.75);
        }

        .sparkline .bar.zero {
            background: rgba(31, 41, 51, 0.16);
        }

        .month-chart-wrap {
            margin: 0 0 var(--space-3);
            padding: var(--space-3) 14px;
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.55);
            overflow-x: auto;
            height: 330px;
        }

        .month-chart-canvas {
            width: 100% !important;
            height: 100% !important;
            min-width: 860px;
            display: block;
        }

        tbody tr:last-child td {
            border-bottom: 0;
        }

        .pill {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 0.78rem;
            font-weight: 700;
        }

        .pill.warn {
            background: rgba(194, 65, 12, 0.1);
            color: var(--warn);
        }

        .muted {
            color: var(--muted);
        }

        .mono {
            font-family: "SFMono-Regular", "Menlo", monospace;
        }

        .mac-cell {
            font-size: 0.9em;
            letter-spacing: 0;
        }

        .stack {
            display: grid;
            gap: var(--space-4);
        }

        .list {
            display: grid;
            gap: var(--space-3);
        }

        .list-item {
            padding: 14px var(--space-4);
            border-radius: var(--radius-md);
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.55);
        }

        .list-item strong {
            display: block;
            margin-bottom: 4px;
        }

        .usage-history-panel .panel-body {
            max-height: 500px;
            overflow: auto;
        }

        .usage-history-panel table {
            width: max-content;
            min-width: 0;
        }

        .usage-history-panel th,
        .usage-history-panel td {
            padding: 6px 8px;
            line-height: 1.15;
            white-space: nowrap;
        }

        .usage-history-panel th:nth-child(1),
        .usage-history-panel td:nth-child(1) {
            padding-right: 4px;
            white-space: nowrap;
            width: 1%;
        }

        .usage-history-panel th:nth-child(2),
        .usage-history-panel td:nth-child(2) {
            padding-left: 4px;
            white-space: nowrap;
            width: 1%;
        }

        .insights-kpis {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: var(--space-3);
            margin-bottom: var(--space-3);
        }

        .insight-kpi {
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.55);
            padding: var(--space-3);
        }

        .insight-kpi .label {
            display: block;
            color: var(--muted);
            font-size: 0.74rem;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .insight-kpi .value {
            display: block;
            margin-top: 6px;
            font-size: 1.35rem;
            font-weight: 700;
        }

        .control-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: var(--space-3);
            margin-bottom: var(--space-3);
        }

        .control-row label {
            margin: 0;
        }

        .insights-tables {
            grid-template-columns: 1fr;
            justify-content: start;
            align-items: start;
            gap: var(--space-4);
        }

        .insights-tables article {
            width: 100%;
            max-width: none;
        }

        .insights-summary {
            grid-column: 1;
        }

        .insights-ap-hotspots {
            grid-column: 1;
        }

        table.insights-table {
            width: auto;
            min-width: 0;
            table-layout: fixed;
        }

        table.insights-table th:first-child,
        table.insights-table td:first-child {
            width: 170px;
            max-width: 170px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        table.insights-table th.num,
        table.insights-table td.num {
            width: 90px;
            white-space: nowrap;
        }

        table.organization-clients-table {
            width: max-content;
            min-width: 0;
            table-layout: auto;
        }

        table.organization-clients-table th:first-child,
        table.organization-clients-table td:first-child {
            width: 1%;
            max-width: none;
            white-space: nowrap;
            overflow: visible;
            text-overflow: clip;
        }

        table.organization-clients-table th.user-id-col,
        table.organization-clients-table td.user-id-col,
        table.organization-clients-table th.mac-col,
        table.organization-clients-table td.mac-col,
        table.organization-clients-table th.network-col,
        table.organization-clients-table td.network-col {
            width: 1%;
            max-width: none;
            white-space: nowrap;
            overflow: visible;
            text-overflow: clip;
        }

        table.organization-clients-table th.network-col,
        table.organization-clients-table td.network-col {
            width: 5ch;
            padding-left: var(--space-2);
            padding-right: var(--space-2);
        }

        .insights-org-top-users {
            grid-template-columns: minmax(640px, 1.45fr) minmax(360px, 1fr);
            align-items: start;
            gap: var(--space-4);
            margin-top: var(--space-3);
        }

        .insights-org-top-users article {
            width: 100%;
            max-width: none;
        }

        @media (max-width: 1200px) {
            .insights-org-top-users {
                grid-template-columns: 1fr;
            }
        }

        .concurrency-heatmap-wrap {
            margin: 0 0 var(--space-3);
            padding: var(--space-3);
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.50);
            overflow-x: auto;
        }

        .concurrency-heatmap-grid {
            display: grid;
            grid-template-columns: 56px repeat(24, minmax(26px, 1fr));
            gap: 3px;
            align-items: center;
            min-width: 860px;
        }

        .concurrency-heatmap-grid .cell {
            min-height: 24px;
            border-radius: 4px;
            font-size: 0.68rem;
            line-height: 1.1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #243447;
        }

        .concurrency-heatmap-grid .cell.header {
            background: transparent;
            font-weight: 700;
            color: var(--muted);
        }

        .concurrency-heatmap-grid .cell.header.day {
            justify-content: flex-start;
            padding-left: 4px;
        }

        .concurrency-heatmap-grid .cell.value {
            border: 1px solid rgba(51, 65, 85, 0.14);
            font-variant-numeric: tabular-nums;
        }

        .concurrency-heatmap-grid .cell.value.low-sample {
            opacity: 0.45;
            border-style: dashed;
            font-size: 0.62rem;
            font-weight: 600;
        }

        @media (max-width: 900px) {
            .columns {
                grid-template-columns: 1fr;
            }

            .hero {
                display: block;
            }
        }
    </style>
</head>
<body>
    <main class="page{% block page_class %}{% endblock %}">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
