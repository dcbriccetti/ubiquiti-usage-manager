{% set throttle_chart_id = "month-throttle-chart-" ~ (mac or "client")|replace(":", "") %}
{% if month_throttle_datasets %}
    <div class="month-chart-wrap">
        <canvas id="{{ throttle_chart_id }}" class="month-chart-canvas" role="img" aria-label="Daily throttling levels for the month"></canvas>
    </div>
    <script id="{{ throttle_chart_id }}-config" type="application/json" data-usage-chart-config>
        {{ {
            "type": "month-throttle",
            "canvasId": throttle_chart_id,
            "labels": month_throttle_x_labels,
            "fullLabels": month_throttle_day_labels,
            "rawDatasets": month_throttle_datasets,
            "alignToLabels": false,
            "xOffset": false,
            "padRight": 58,
            "xAxisTitle": "Day of month",
            "yAxisTitle": "Active minutes/day"
        } | tojson }}
    </script>
{% else %}
    <p class="muted">No throttling-level measurements for this month yet.</p>
{% endif %}
