<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ app_title }} | Admin Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='club-admin.css') }}">
</head>
<body>
  <main class="page narrow">
    <header class="page-header">
      <div>
        <p class="app-title">{{ app_title }}</p>
        <h1>Admin Login</h1>
      </div>
      <nav class="nav-links" aria-label="User management navigation">
        <a href="{{ url_for('self_checkin') }}">Self Check-in</a>
      </nav>
    </header>

    <form class="admin-login-form" action="{{ url_for('admin_login') }}" method="post">
      <input type="hidden" name="next" value="{{ next_url }}">
      <label>
        Password
        <input type="password" name="password" autocomplete="current-password" required {% if not auth_configured %}disabled{% endif %}>
      </label>
      <button type="submit" {% if not auth_configured %}disabled{% endif %}>Log In</button>
    </form>

    {% if message %}
      <p class="notice">{{ message }}</p>
    {% endif %}
  </main>
</body>
</html>
