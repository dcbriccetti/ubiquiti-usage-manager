<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ app_title }} | Self Check-in</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='club-admin.css') }}">
</head>
<body>
  <main class="page narrow">
    <header class="page-header">
      <div>
        <p class="app-title">{{ app_title }}</p>
        <h1>Self Check-in</h1>
      </div>
      <nav class="nav-links" aria-label="User management navigation">
        <a href="{{ url_for('guest_registration') }}">Guest Registration</a>
        <a href="{{ url_for('admin_login') }}">Admin Login</a>
      </nav>
    </header>

    <form class="self-checkin-form barcode-checkin-form" action="{{ url_for('self_checkin') }}" method="post">
      <label>
        Barcode
        <input type="text" name="barcode_token" autocomplete="off" autofocus>
      </label>
      <button type="submit">Check In</button>
    </form>

    <form class="self-checkin-form" action="{{ url_for('self_checkin') }}" method="post">
      <label>
        Phone Number
        <input type="tel" name="phone" autocomplete="tel" required>
      </label>
      <label>
        Initials or First Name
        <input type="text" name="initials" maxlength="40" autocomplete="given-name" required>
      </label>
      <button type="submit">Check In</button>
    </form>

    {% if message %}
      <p class="notice">{{ message }}</p>
    {% endif %}

    {% if barcode_svg %}
      <section class="checkin-barcode-card" aria-label="Saved self check-in barcode">
        <h2>Your Check-in Barcode</h2>
        <p>Save this barcode for next time.</p>
        <div class="checkin-barcode-frame">
          {{ barcode_svg|safe }}
        </div>
      </section>
    {% endif %}
  </main>
</body>
</html>
