<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ app_title }} | Guest Registration</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='club-admin.css') }}">
</head>
<body>
  <main class="page narrow guest-registration-page">
    <header class="page-header">
      <div>
        <p class="app-title">{{ app_title }}</p>
        <h1>Guest Registration</h1>
      </div>
      <nav class="nav-links" aria-label="User management navigation">
        <a href="{{ url_for('self_checkin') }}">Back to Self Check-in</a>
      </nav>
    </header>

    {% if message %}
      <p class="notice">{{ message }}</p>
    {% endif %}

    <form class="edit-form guest-registration-form" action="{{ url_for('guest_registration') }}" method="post" autocomplete="off">
      <p class="required-note">Items marked <span aria-hidden="true">•</span> are required.</p>
      <section class="guest-registration-visit-strip" aria-labelledby="visit-section-title">
        <h2 id="visit-section-title">Visit</h2>
        <label class="required-field visit-date-field">
          <span>Visit Date</span>
          <input type="date" name="visit_date" value="{{ form_data.get('visit_date', today) }}" required tabindex="-1">
        </label>
      </section>

      <section class="guest-registration-section" aria-labelledby="visitor-section-title">
        <h2 id="visitor-section-title">Visitor</h2>
        <label class="required-field">
          <span>Last Name</span>
          <input type="text" name="last_name" value="{{ form_data.get('last_name', '') }}" autocomplete="off" required autofocus>
        </label>
        <label class="required-field">
          <span>First Name</span>
          <input type="text" name="first_name" value="{{ form_data.get('first_name', '') }}" autocomplete="off" required>
        </label>
        <label>
          <span>Nickname or Preferred Name</span>
          <input type="text" name="nickname" value="{{ form_data.get('nickname', '') }}" autocomplete="off">
        </label>
        <label class="required-field">
          <span>Date of Birth</span>
          <input type="text" name="date_of_birth" value="{{ form_data.get('date_of_birth', '') }}" autocomplete="off" inputmode="numeric" placeholder="YYYY-MM-DD or MM/DD/YYYY" required>
        </label>
      </section>

      <section class="guest-registration-section" aria-labelledby="contact-section-title">
        <h2 id="contact-section-title" class="required-section-title"><span aria-hidden="true">•</span>Contact <span class="visually-hidden">required</span></h2>
        <p class="section-note detail-wide">A phone number or email is required.</p>
        <label>
          <span>Cell Phone</span>
          <input type="tel" name="cell_phone" value="{{ form_data.get('cell_phone', '') }}" autocomplete="off" inputmode="tel">
        </label>
        <label>
          <span>Other Phone</span>
          <input type="tel" name="other_phone" value="{{ form_data.get('other_phone', '') }}" autocomplete="off" inputmode="tel">
        </label>
        <label>
          <span>Other Phone Type</span>
          <select name="other_phone_type">
            <option value=""></option>
            <option value="home" {% if form_data.get('other_phone_type') == 'home' %}selected{% endif %}>Home</option>
            <option value="work" {% if form_data.get('other_phone_type') == 'work' %}selected{% endif %}>Work</option>
            <option value="other" {% if form_data.get('other_phone_type') == 'other' %}selected{% endif %}>Other</option>
          </select>
        </label>
        <label>
          <span>Email Address</span>
          <input type="email" name="email" value="{{ form_data.get('email', '') }}" autocomplete="off">
        </label>
      </section>

      <section class="guest-registration-section" aria-labelledby="address-section-title">
        <h2 id="address-section-title">Address</h2>
        <label class="detail-wide required-field">
          <span>Street Address</span>
          <input type="text" name="address" value="{{ form_data.get('address', '') }}" autocomplete="off" required>
        </label>
        <label class="required-field">
          <span>Zip Code</span>
          <input type="text" name="zip" value="{{ form_data.get('zip', '') }}" autocomplete="off" inputmode="numeric" required data-zip-lookup>
        </label>
        <label class="required-field">
          <span>City</span>
          <input type="text" name="city" value="{{ form_data.get('city', '') }}" autocomplete="off" required tabindex="-1" data-city-field>
        </label>
        <label class="state-field required-field">
          <span>State</span>
          <input type="text" name="state" value="{{ form_data.get('state', '') }}" autocomplete="off" maxlength="2" required tabindex="-1" data-state-field>
        </label>
      </section>

      <section class="guest-registration-section" aria-labelledby="details-section-title">
        <h2 id="details-section-title">Visit Details</h2>
        <label class="required-field">
          <span>Marital Status</span>
          <select name="marital_status" required>
            <option value=""></option>
            <option value="single" {% if form_data.get('marital_status') == 'single' %}selected{% endif %}>Single</option>
            <option value="married" {% if form_data.get('marital_status') == 'married' %}selected{% endif %}>Married</option>
            <option value="recognized_couple" {% if form_data.get('marital_status') == 'recognized_couple' %}selected{% endif %}>Recognized Couple</option>
          </select>
        </label>
        <label>
          <span>Partner With Me Today</span>
          <input type="text" name="partner_name" value="{{ form_data.get('partner_name', '') }}" autocomplete="off">
        </label>
        <label class="checkbox-field">
          <input type="checkbox" name="guest_of_member" value="1" {% if form_data.get('guest_of_member') %}checked{% endif %}>
          <span>Guest of a member</span>
        </label>
        <label>
          <span>Member Name</span>
          <input type="text" name="member_name" value="{{ form_data.get('member_name', '') }}" autocomplete="off">
        </label>
        <label class="detail-wide">
          <span>How Did You Hear About Us?</span>
          <input type="text" name="heard_about" value="{{ form_data.get('heard_about', '') }}" autocomplete="off">
        </label>
        <label class="checkbox-field detail-wide">
          <input type="checkbox" name="newsletter_opt_out" value="1" {% if form_data.get('newsletter_opt_out') %}checked{% endif %}>
          <span>Do not sign me up for the newsletter</span>
        </label>
      </section>

      <div class="form-actions">
        <button type="submit">Submit Registration</button>
      </div>
    </form>
  </main>
  <script>
    (() => {
      const zipInput = document.querySelector("[data-zip-lookup]");
      const cityInput = document.querySelector("[data-city-field]");
      const stateInput = document.querySelector("[data-state-field]");
      if (!zipInput || !cityInput || !stateInput) {
        return;
      }

      let lastLookupZip = "";
      let lookupController = null;

      const lookupZip = async () => {
        const zip = zipInput.value.replace(/\D+/g, "").slice(0, 5);
        if (zip.length !== 5 || zip === lastLookupZip) {
          return;
        }
        lastLookupZip = zip;
        lookupController?.abort();
        lookupController = new AbortController();
        try {
          const response = await fetch(
            `https://api.zippopotam.us/us/${encodeURIComponent(zip)}`,
            { signal: lookupController.signal },
          );
          if (!response.ok) {
            return;
          }
          const payload = await response.json();
          const place = Array.isArray(payload.places) ? payload.places[0] : null;
          const city = place?.["place name"];
          const state = place?.["state abbreviation"];
          if (city) {
            cityInput.value = city;
          }
          if (state) {
            stateInput.value = state;
          }
        } catch (error) {
          if (error.name !== "AbortError") {
            return;
          }
        }
      };

      zipInput.addEventListener("input", lookupZip);
      zipInput.addEventListener("change", lookupZip);
    })();
  </script>
</body>
</html>
