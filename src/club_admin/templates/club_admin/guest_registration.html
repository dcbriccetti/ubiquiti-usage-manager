<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ app_title }} | Guest Registration</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='club-admin.css') }}">
</head>
<body>
  <main class="page narrow guest-registration-page">
    <header class="page-header">
      <div>
        <p class="app-title">{{ app_title }}</p>
        <h1>Guest Registration</h1>
      </div>
      <nav class="nav-links" aria-label="User management navigation">
        <a href="{{ url_for('self_checkin') }}">Back to Self Check-in</a>
      </nav>
    </header>

    {% if message %}
      <p class="notice">{{ message }}</p>
    {% endif %}

    <form class="edit-form guest-registration-form" action="{{ url_for('guest_registration') }}" method="post">
      <p class="required-note">Fields marked <span aria-hidden="true">•</span> are required.</p>
      <section class="guest-registration-section compact-section" aria-labelledby="visit-section-title">
        <h2 id="visit-section-title">Visit</h2>
        <label class="required-field">
          <span>Visit Date</span>
          <input type="date" name="visit_date" value="{{ form_data.get('visit_date', today) }}" required>
        </label>
      </section>

      <section class="guest-registration-section" aria-labelledby="name-section-title">
        <h2 id="name-section-title">Name</h2>
        <label class="required-field">
          <span>Last Name</span>
          <input type="text" name="last_name" value="{{ form_data.get('last_name', '') }}" autocomplete="family-name" required>
        </label>
        <label class="required-field">
          <span>First Name</span>
          <input type="text" name="first_name" value="{{ form_data.get('first_name', '') }}" autocomplete="given-name" required>
        </label>
        <label>
          <span>Middle</span>
          <input type="text" name="middle_name" value="{{ form_data.get('middle_name', '') }}" autocomplete="additional-name">
        </label>
        <label>
          <span>Nickname or Preferred Name</span>
          <input type="text" name="nickname" value="{{ form_data.get('nickname', '') }}">
        </label>
      </section>

      <section class="guest-registration-section" aria-labelledby="contact-section-title">
        <h2 id="contact-section-title">Contact</h2>
        <p class="section-note detail-wide">At least one phone number or email is required.</p>
        <label>
          <span>Cell Phone</span>
          <input type="tel" name="cell_phone" value="{{ form_data.get('cell_phone', '') }}" autocomplete="tel" inputmode="tel">
        </label>
        <label>
          <span>Other Phone</span>
          <input type="tel" name="other_phone" value="{{ form_data.get('other_phone', '') }}" inputmode="tel">
        </label>
        <label>
          <span>Other Phone Type</span>
          <select name="other_phone_type">
            <option value=""></option>
            <option value="home" {% if form_data.get('other_phone_type') == 'home' %}selected{% endif %}>Home</option>
            <option value="work" {% if form_data.get('other_phone_type') == 'work' %}selected{% endif %}>Work</option>
            <option value="other" {% if form_data.get('other_phone_type') == 'other' %}selected{% endif %}>Other</option>
          </select>
        </label>
        <label>
          <span>Email Address</span>
          <input type="email" name="email" value="{{ form_data.get('email', '') }}" autocomplete="email">
        </label>
      </section>

      <section class="guest-registration-section" aria-labelledby="address-section-title">
        <h2 id="address-section-title">Address</h2>
        <label class="detail-wide required-field">
          <span>Street Address</span>
          <input type="text" name="address" value="{{ form_data.get('address', '') }}" autocomplete="street-address" required>
        </label>
        <label class="required-field">
          <span>City</span>
          <input type="text" name="city" value="{{ form_data.get('city', '') }}" autocomplete="address-level2" required>
        </label>
        <label class="state-field required-field">
          <span>State</span>
          <input type="text" name="state" value="{{ form_data.get('state', '') }}" autocomplete="address-level1" maxlength="2" required>
        </label>
        <label class="required-field">
          <span>Zip Code</span>
          <input type="text" name="zip" value="{{ form_data.get('zip', '') }}" autocomplete="postal-code" inputmode="numeric" required>
        </label>
      </section>

      <section class="guest-registration-section" aria-labelledby="details-section-title">
        <h2 id="details-section-title">Visit Details</h2>
        <label class="required-field">
          <span>Marital Status</span>
          <select name="marital_status" required>
            <option value=""></option>
            <option value="single" {% if form_data.get('marital_status') == 'single' %}selected{% endif %}>Single</option>
            <option value="married" {% if form_data.get('marital_status') == 'married' %}selected{% endif %}>Married</option>
            <option value="recognized_couple" {% if form_data.get('marital_status') == 'recognized_couple' %}selected{% endif %}>Recognized Couple</option>
          </select>
        </label>
        <label>
          <span>Partner With Me Today</span>
          <input type="text" name="partner_name" value="{{ form_data.get('partner_name', '') }}">
        </label>
        <label class="checkbox-field">
          <input type="checkbox" name="guest_of_member" value="1" {% if form_data.get('guest_of_member') %}checked{% endif %}>
          <span>Guest of a member</span>
        </label>
        <label>
          <span>Member Name</span>
          <input type="text" name="member_name" value="{{ form_data.get('member_name', '') }}">
        </label>
        <label class="detail-wide">
          <span>How Did You Hear About Us?</span>
          <input type="text" name="heard_about" value="{{ form_data.get('heard_about', '') }}">
        </label>
        <label class="checkbox-field detail-wide">
          <input type="checkbox" name="newsletter_opt_out" value="1" {% if form_data.get('newsletter_opt_out') %}checked{% endif %}>
          <span>Do not sign me up for the newsletter</span>
        </label>
      </section>

      <div class="form-actions">
        <button type="submit">Submit Registration</button>
      </div>
    </form>
  </main>
</body>
</html>
